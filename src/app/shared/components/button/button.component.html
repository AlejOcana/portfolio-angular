<ng-container *ngIf="isLink; else buttonTpl">
  <a [href]="href" [class]="classes" [attr.aria-disabled]="disabled ? 'true' : null">
    <ng-content></ng-content>
  </a>
</ng-container>

<ng-template #buttonTpl>
  <button [class]="classes" [disabled]="disabled" type="button">
    <ng-content></ng-content>
  </button>
</ng-template>
