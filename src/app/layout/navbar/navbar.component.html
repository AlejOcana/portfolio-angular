<header class="navbar" [class.scrolled]="isScrolled()">
  <div class="navbar-container">
    <a href="#top" class="navbar-logo" (click)="closeMenu()">
      AO
    </a>

    <nav class="navbar-nav" id="navbar-menu" [class.open]="isMenuOpen()">
      <div class="drawer-header">
        <span>Menu</span>
        <button class="drawer-close" (click)="closeMenu()" aria-label="Close menu">
          <app-icon name="x" [size]="24"></app-icon>
        </button>
      </div>
      @for (link of navLinks; track link.href) {
        <a
          [href]="link.href"
          class="nav-link"
          (click)="closeMenu()"
        >
          <app-icon [name]="link.icon" [size]="20"></app-icon>
          <span>{{ link.label }}</span>
        </a>
      }
      <button class="nav-cta" (click)="scrollToContact()">
        <app-icon name="send" [size]="20"></app-icon>
        <span>Get in Touch</span>
      </button>
    </nav>

    <button class="navbar-toggle" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen()" aria-controls="navbar-menu" aria-label="Toggle navigation menu">
      <app-icon [name]="isMenuOpen() ? 'x' : 'menu'" [size]="24"></app-icon>
    </button>
  </div>
</header>

<div class="navbar-backdrop" [class.visible]="isMenuOpen()" (click)="closeMenu()"></div>
