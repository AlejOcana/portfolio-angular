<section id="education" class="education section">
  <div class="education-container">
    <div class="education-header">
      <h2 class="section-title heading-gradient">Education & Certifications</h2>
    </div>

    <div class="education-grid" @staggerIn>
      <div class="education-column">
        <h3 class="column-title">Education</h3>
        @for (edu of education; track edu.degree) {
          <div class="edu-item" appScrollReveal data-stagger="1">
            <h4 class="edu-degree">{{ edu.degree }}</h4>
            <p class="edu-institution">{{ edu.institution }}</p>
            <span class="edu-period">{{ edu.period }}</span>
            <p class="edu-desc">{{ edu.description }}</p>
          </div>
        }
      </div>

      <div class="certifications-column">
        <h3 class="column-title">Certifications</h3>
        <ul class="cert-list">
          @for (cert of certifications; track cert) {
            <li class="cert-item">{{ cert }}</li>
          }
        </ul>
      </div>
    </div>
  </div>
</section>
