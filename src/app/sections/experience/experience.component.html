<section id="experience" class="experience section">
  <div class="experience-container">
    <div class="experience-header">
      <h2 class="section-title heading-gradient">Experience</h2>
    </div>

    <div class="timeline" @staggerIn>
      @for (exp of experience; track exp.company) {
        <div class="experience-item" appScrollReveal data-stagger="1">
          <div class="timeline-dot"></div>
          <div class="timeline-content">
            <div class="exp-header">
              <h3 class="exp-company">{{ exp.company }}</h3>
              <span class="exp-period">{{ exp.period }}</span>
            </div>
            <p class="exp-role">{{ exp.role }}</p>
            <ul class="exp-highlights">
              @for (highlight of exp.highlights; track highlight) {
                <li>{{ highlight }}</li>
              }
            </ul>
          </div>
        </div>
      }
    </div>
  </div>
</section>
